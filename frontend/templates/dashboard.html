<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<title>Drone Dashboard</title>

	<link rel="stylesheet" href="/static/css/style.css">

	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<h1>Drone Surveillance Dashboard</h1>

<div class="container">

<div class="card">
	<h2>Live Drone Feed</h2>
	<img src="https://via.placeholder.com/400x250" alt="Live drone feed placeholder">
</div>

<div class="card">
<h2>Detected Object</h2>
<p id="object">Loading...</p>
</div>

<div class="card">
<h2>Threat Level</h2>
<p id="threat">Loading...</p>
</div>

<div class="card">
<h2>Threat Graph</h2>
<canvas id="threatChart"></canvas>
</div>

</div>

<script src="/static/js/script.js"></script>

</body>
</html>
